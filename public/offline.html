<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Offline — SongSaver</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #09090b;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      padding-bottom: max(2rem, env(safe-area-inset-bottom));
      text-align: center;
      gap: 1rem;
    }

    .icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.5rem;
    }

    .icon svg { width: 32px; height: 32px; fill: white; }

    h1 { font-size: 1.25rem; font-weight: 700; }

    p { font-size: 0.9rem; color: rgba(255,255,255,0.5); max-width: 280px; line-height: 1.6; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.3);
      color: #fbbf24;
      font-size: 0.75rem;
      font-weight: 600;
    }

    button {
      margin-top: 0.5rem;
      padding: 12px 28px;
      border-radius: 14px;
      background: #7c3aed;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:active { opacity: 0.75; }

    .tip {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="icon">
    <!-- Music note icon -->
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 18V5l12-2v13M6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm15-2a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="badge">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
    </svg>
    You're offline
  </div>

  <h1>SongSaver</h1>
  <p>You don't have an internet connection. Reconnect to access your full song library.</p>

  <button onclick="window.location.reload()">Try again</button>

  <p class="tip">Tip: Save songs for offline by tapping the bookmark icon while online.</p>
</body>
</html>
